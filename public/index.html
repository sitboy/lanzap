<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>局域网传输助手</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { font:16px/1.4 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
         background:#ededed; display:flex; flex-direction:column; }

  header { background:#ededed; border-bottom:.5px solid #d9d9d9;
           padding:10px 12px; padding-top:calc(10px + env(safe-area-inset-top));
           display:flex; align-items:center; gap:8px; position:sticky; top:0; z-index:10; }
  header .title { flex:1; text-align:center; font-size:17px; font-weight:500; }
  header button { border:none; background:none; font-size:13px; color:#576b95; cursor:pointer; }

  /* 本网设备栏 */
  #peers { display:flex; gap:10px; padding:10px 12px; overflow-x:auto; background:#f7f7f7;
           border-bottom:.5px solid #e0e0e0; }
  .peer { display:flex; flex-direction:column; align-items:center; gap:4px; flex:none; width:56px; }
  .peer .pa { width:44px; height:44px; border-radius:8px; background:#fff; display:flex;
              align-items:center; justify-content:center; font-size:22px; position:relative;
              border:1.5px solid transparent; }
  .peer .pn { font-size:11px; color:#888; max-width:56px; overflow:hidden; white-space:nowrap;
              text-overflow:ellipsis; }
  .peer.self .pa { border-color:#07c160; }
  .peer .dot { position:absolute; right:-2px; bottom:-2px; width:10px; height:10px;
               border-radius:50%; background:#07c160; border:2px solid #f7f7f7; }
  #empty { font-size:13px; color:#b2b2b2; padding:4px 8px; align-self:center; }

  #list { flex:1; overflow-y:auto; padding:12px 12px 4px; }
  .time,.sys { text-align:center; color:#b2b2b2; font-size:12px; margin:12px 0 8px; }

  .row { display:flex; margin-bottom:14px; align-items:flex-start; }
  .row.me { flex-direction:row-reverse; }
  .avatar { width:38px; height:38px; border-radius:5px; flex:none; background:#fff;
            display:flex; align-items:center; justify-content:center; font-size:20px; }
  .wrap { max-width:72%; display:flex; flex-direction:column; margin:0 10px; }
  .row.me .wrap { align-items:flex-end; }
  .dev { font-size:11px; color:#b2b2b2; margin-bottom:3px; }
  .bubble { border-radius:5px; word-break:break-all; white-space:pre-wrap; }
  .bubble.text { padding:9px 12px; background:#fff; }
  .row.me .bubble.text { background:#95ec69; }

  .bubble.file { background:#fff; width:236px; max-width:100%; display:block;
                 text-decoration:none; color:inherit; }
  .fmain { display:flex; padding:12px; align-items:center; gap:10px; }
  .finfo { flex:1; min-width:0; }
  .fname { font-size:15px; color:#000; display:-webkit-box; -webkit-line-clamp:2;
           -webkit-box-orient:vertical; overflow:hidden; }
  .fsize { font-size:12px; color:#b2b2b2; margin-top:4px; }
  .ficon { font-size:34px; flex:none; }
  .ffoot { border-top:.5px solid #f0f0f0; padding:5px 12px; font-size:11px; color:#b2b2b2;
           display:flex; justify-content:space-between; }
  .prog { height:3px; background:#eee; border-radius:2px; margin:0 12px 10px; overflow:hidden; }
  .prog>div { height:100%; background:#07c160; width:0%; }
  .bubble.img { background:none; }
  .bubble.img img { max-width:100%; max-height:260px; border-radius:5px; display:block; }

  footer { background:#f7f7f7; border-top:.5px solid #d9d9d9; padding:8px 10px;
           padding-bottom:calc(8px + env(safe-area-inset-bottom));
           display:flex; gap:8px; align-items:flex-end; position:sticky; bottom:0; }
  #txt { flex:1; border:none; border-radius:5px; background:#fff; padding:9px 10px;
         font-size:16px; resize:none; max-height:110px; outline:none; }
  .btn { width:34px; height:34px; border-radius:50%; border:1.5px solid #7d7d7d;
         background:none; font-size:22px; color:#555; flex:none; cursor:pointer;
         display:flex; align-items:center; justify-content:center; }
  #send { display:none; border:none; background:#07c160; color:#fff; border-radius:5px;
          width:auto; padding:0 16px; height:36px; font-size:15px; }
  #send.show { display:block; }
  #file { display:none; }
  #foot-note { text-align:center; font-size:11px; color:#c2c2c2; padding:2px 0 6px; background:#f7f7f7; }
</style>
</head>
<body>
<header>
  <button id="rename" data-i18n="rename"></button>
  <div class="title" data-i18n="app_title"></div>
  <button id="lang"></button>
</header>
<div id="peers"></div>
<div id="list"></div>
<footer>
  <textarea id="txt" rows="1"></textarea>
  <button class="btn" id="plus">+</button>
  <button id="send" class="btn" data-i18n="send"></button>
  <input type="file" id="file" multiple>
</footer>
<div id="foot-note" data-i18n="direct"></div>
<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
