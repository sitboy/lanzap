<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>局域网传输助手</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body { background:#dcdcdc; font:16px/1.45 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }

  /* 手机全宽;桌面居中窄栏,还原微信聊天窗比例 */
  #app { height:100%; max-width:640px; margin:0 auto; background:#ededed;
         display:flex; flex-direction:column; box-shadow:0 0 12px rgba(0,0,0,.12); }
  #main { flex:1; min-height:0; display:flex; flex-direction:column; }
  #side { display:none; }

  header { background:#ededed; border-bottom:.5px solid #d5d5d5; height:48px;
           padding:0 8px; padding-top:env(safe-area-inset-top);
           display:flex; align-items:center; flex:none; }
  header .side { width:60px; display:flex; }
  header .side.r { justify-content:flex-end; }
  header .title { flex:1; text-align:center; font-size:17px; font-weight:600; color:#000;
                  overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
  header button { border:none; background:none; font-size:13px; color:#576b95; cursor:pointer; padding:6px; }

  /* 本网设备条:轻量融入背景 */
  #peers { display:flex; gap:14px; padding:10px 14px 8px; overflow-x:auto; flex:none;
           background:#ededed; border-bottom:.5px solid #e3e3e3; }
  #peers::-webkit-scrollbar { display:none; }
  .peer { display:flex; flex-direction:column; align-items:center; gap:4px; flex:none; width:48px; }
  .peer .pa { width:40px; height:40px; border-radius:6px; position:relative; overflow:visible; }
  .peer .pa svg { width:100%; height:100%; border-radius:6px; display:block; }
  .peer .pn { font-size:10px; color:#999; max-width:52px; overflow:hidden;
              white-space:nowrap; text-overflow:ellipsis; }
  .peer .dot { position:absolute; right:-3px; bottom:-3px; width:11px; height:11px;
               border-radius:50%; border:2px solid #ededed; background:#c9c9c9; }
  .peer .dot.on { background:#07c160; }
  #empty { font-size:12px; color:#b2b2b2; align-self:center; padding:0 4px; }
  .peer.invite .pa { border:1.5px dashed #b8b8b8; background:none; display:flex;
    align-items:center; justify-content:center; font-size:22px; color:#9a9a9a; cursor:pointer; }

  /* 邀请/加入 双面弹层 */
  #mask { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:50;
          align-items:center; justify-content:center; }
  #mask.show { display:flex; }
  #invite-card { background:#fff; border-radius:14px; padding:28px 30px 16px; width:312px;
                 text-align:center; position:relative;
                 box-shadow:0 12px 40px rgba(0,0,0,.18); }
  #invite-card h3 { font-size:17px; font-weight:600; margin-bottom:8px; }
  #invite-card .tip { font-size:12.5px; color:#999; line-height:1.6; margin-bottom:18px; }
  #qr { display:flex; justify-content:center; margin-bottom:14px; }
  #qr img, #qr canvas { border-radius:8px; }
  #room-label { font-size:26px; font-weight:700; color:#181818; letter-spacing:6px;
                margin-bottom:18px; font-variant-numeric:tabular-nums; }
  #room-label small { display:block; font-size:11px; font-weight:400; color:#b2b2b2;
                      letter-spacing:1px; margin-bottom:2px; }
  #invite-card button { display:block; width:100%; border:none; border-radius:8px; height:44px;
    font-size:15px; cursor:pointer; margin-top:10px; }
  #invite-card .primary { background:#07c160; color:#fff; font-weight:500; }
  #invite-card .minor { background:#f5f5f5; color:#333; height:40px; }
  .flip { display:block; font-size:13px; color:#576b95; margin:16px 0 6px; cursor:pointer; }
  #close-btn { position:absolute; top:10px; right:10px; width:32px !important; height:32px;
    background:none !important; color:#c0c0c0; font-size:15px; margin:0 !important; }
  #pane-join { display:none; }
  #invite-card.join #pane-invite { display:none; }
  #invite-card.join #pane-join { display:block; }
  #code-row { display:flex; gap:8px; margin-top:12px; }
  #code-input { flex:1; border:1.5px solid #e5e5e5; border-radius:8px; height:44px;
    text-align:center; font-size:17px; letter-spacing:4px; outline:none; text-transform:uppercase; }
  #code-input:focus { border-color:#07c160; }
  #code-input::placeholder { text-transform:none; font-size:13px; letter-spacing:0; color:#c0c0c0; }
  #code-go { width:76px !important; background:#f5f5f5; color:#333; }
  #code-go.on { background:#07c160; color:#fff; }

  /* 站内扫码层 */
  #scan { display:none; position:fixed; inset:0; background:#000; z-index:60; }
  #scan.show { display:block; }
  #cam { width:100%; height:100%; object-fit:cover; }
  #scan-frame { position:absolute; top:50%; left:50%; width:230px; height:230px;
    transform:translate(-50%,-56%); border-radius:16px;
    box-shadow:0 0 0 100vmax rgba(0,0,0,.45); border:2px solid rgba(255,255,255,.9); }
  #scan-tip { position:absolute; left:0; right:0; top:calc(50% + 130px); text-align:center;
    color:#fff; font-size:14px; text-shadow:0 1px 3px rgba(0,0,0,.5); }
  #scan-cancel { position:absolute; top:calc(14px + env(safe-area-inset-top)); right:16px;
    width:38px; height:38px; border:none; border-radius:50%; background:rgba(0,0,0,.45);
    color:#fff; font-size:17px; cursor:pointer; }

  #list { flex:1; overflow-y:auto; padding:16px 16px 8px; }
  .time,.sys { text-align:center; color:#a8a8a8; font-size:12px; margin:14px 0 10px; }

  .row { display:flex; margin-bottom:16px; align-items:flex-start; }
  .row.me { flex-direction:row-reverse; }
  .avatar { width:40px; height:40px; border-radius:6px; flex:none; overflow:hidden; }
  .avatar svg { width:100%; height:100%; display:block; }
  .wrap { max-width:calc(100% - 130px); display:flex; flex-direction:column; margin:0 12px; }
  .row.me .wrap { align-items:flex-end; }
  .dev { font-size:12px; color:#b2b2b2; margin-bottom:4px; }

  /* 气泡 + 微信式尖角(pre-wrap 只给文字气泡,否则模板缩进会被渲染成空白) */
  .bubble { border-radius:6px; position:relative; }
  .bubble.text { padding:10px 13px; background:#fff; font-size:16px; color:#181818;
                 word-break:break-all; white-space:pre-wrap; }
  .bubble.text::before { content:''; position:absolute; top:14px; left:-10px;
    border:5px solid transparent; border-right-color:#fff; }
  .row.me .bubble.text { background:#95ec69; }
  .row.me .bubble.text::before { left:auto; right:-10px;
    border-right-color:transparent; border-left-color:#95ec69; }

  /* 文件卡片:白卡 + 彩色类型图标 + 底部来源栏 */
  .bubble.file { background:#fff; width:238px; max-width:100%; display:block;
                 text-decoration:none; color:inherit; }
  .bubble.file::before { content:''; position:absolute; top:14px; left:-10px;
    border:5px solid transparent; border-right-color:#fff; }
  .row.me .bubble.file::before { left:auto; right:-10px;
    border-right-color:transparent; border-left-color:#fff; }
  .fmain { display:flex; padding:13px 12px; align-items:flex-start; gap:10px; }
  .finfo { flex:1; min-width:0; }
  .fname { font-size:15.5px; color:#181818; line-height:1.35; display:-webkit-box;
           -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .fsize { font-size:12px; color:#b2b2b2; margin-top:5px; }
  .ficon { width:40px; height:46px; flex:none; }
  .ficon svg { width:100%; height:100%; display:block; }
  .ffoot { border-top:.5px solid #ececec; padding:6px 12px; font-size:11px; color:#b2b2b2;
           display:flex; justify-content:space-between; }
  .prog { height:2.5px; background:#f0f0f0; overflow:hidden; }
  .prog>div { height:100%; background:#07c160; width:0%; }

  .bubble.img { background:none; }
  .bubble.img img { max-width:100%; max-height:280px; border-radius:6px; display:block; }

  footer { background:#f6f6f6; border-top:.5px solid #d5d5d5; padding:8px 10px;
           padding-bottom:calc(8px + env(safe-area-inset-bottom)); flex:none; }
  #tools { display:none; }
  #irow { display:flex; gap:9px; align-items:flex-end; }
  #txt { flex:1; border:none; border-radius:5px; background:#fff; padding:9px 11px;
         font-size:16px; resize:none; max-height:110px; outline:none; line-height:1.4; }
  .btn { width:32px; height:32px; border-radius:50%; border:1.6px solid #6b6b6b;
         background:none; font-size:20px; color:#4a4a4a; flex:none; cursor:pointer;
         display:flex; align-items:center; justify-content:center; margin-bottom:3px; }
  #send { display:none; border:none; background:#07c160; color:#fff; border-radius:5px;
          padding:0 18px; height:36px; font-size:15px; font-weight:500; cursor:pointer; }
  #send.show { display:block; }
  #plus.hidden { display:none; }
  #file { display:none; }
  #foot-note { text-align:center; font-size:10.5px; color:#c6c6c6; padding:3px 0 5px;
               background:#f6f6f6; flex:none; }

  /* ── 桌面形态:对标微信 Mac / filehelper.weixin.qq.com ── */
  @media (min-width: 640px) {
    body { background:#2b2b2b; display:flex; align-items:center; justify-content:center; }
    /* 窗口比例参照微信 Mac:宽 880 高≈屏 82%,居中悬浮 */
    #app { width:880px; max-width:calc(100% - 64px); height:min(760px, calc(100% - 56px));
           margin:0; border-radius:10px; overflow:hidden; flex-direction:row; }
    /* 左侧功能边栏(微信 Mac 式,为扩展预留) */
    #side { display:flex; flex-direction:column; align-items:center; width:60px; flex:none;
            background:#e5e4e3; padding:20px 0 14px; gap:6px;
            border-right:.5px solid #d8d8d8; }
    #side-avatar { width:36px; height:36px; border-radius:6px; overflow:hidden;
                   cursor:pointer; margin-bottom:14px; }
    #side-avatar svg { width:100%; height:100%; display:block; }
    .nav-ic { width:40px; height:40px; border:none; background:none; cursor:pointer;
              color:#5f5f5f; border-radius:6px; display:flex; align-items:center;
              justify-content:center; }
    .nav-ic svg { width:24px; height:24px; }
    .nav-ic:hover { background:#dbdad9; }
    .nav-ic.active { color:#07c160; }
    .nav-spacer { flex:1; }
    header .side { width:auto; }
    #rename { display:none; }        /* 桌面:改名入口=点边栏头像 */
    header { background:#f7f7f7; height:52px; }
    header .title { text-align:left; padding-left:8px; font-size:16px; }
    #peers { background:#f7f7f7; }
    #list { background:#f5f5f5; }
    .bubble.text { background:#ececec; }
    .bubble.text::before { border-right-color:#ececec; }
    .row.me .bubble.text { background:#95ec69; }
    .row.me .bubble.text::before { border-left-color:#95ec69; border-right-color:transparent; }
    .avatar { width:36px; height:36px; border-radius:4px; }
    footer { background:#f7f7f7; padding:4px 14px 10px; display:flex; flex-direction:column; }
    #tools { display:flex; padding:4px 0 2px; }
    #tools button { border:none; background:none; cursor:pointer; padding:4px; border-radius:4px; }
    #tools button:hover { background:#e8e8e8; }
    #irow { flex-direction:column; align-items:stretch; gap:0; }
    #plus { display:none; }
    #txt { background:transparent; border-radius:0; padding:6px 4px; font-size:15px;
           min-height:64px; max-height:180px; }
    #send { display:block; align-self:flex-end; margin-top:4px; height:30px; padding:0 26px;
            font-size:13px; border-radius:4px; background:#e9e9e9; color:#b6b6b6; }
    #send.show { background:#07c160; color:#fff; }
    #foot-note { background:#f7f7f7; }
  }
</style>
</head>
<body>
<div id="app">
<nav id="side">
  <div id="side-avatar" title=""></div>
  <button class="nav-ic active" title="">
    <svg viewBox="0 0 28 28"><path d="M14 4C8 4 3.5 8 3.5 13c0 2.8 1.5 5.3 3.9 7l-.9 3.6 4-2.1c1.1.3 2.3.5 3.5.5 6 0 10.5-4 10.5-9S20 4 14 4z" fill="currentColor"/></svg>
  </button>
  <button class="nav-ic" id="nav-invite" title="">
    <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="10" r="4.2"/><path d="M4 23c0-3.8 3.1-6.5 7-6.5s7 2.7 7 6.5M22 8v8M18 12h8"/></svg>
  </button>
  <div class="nav-spacer"></div>
  <button class="nav-ic" id="nav-menu" title="">
    <svg viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M5 8.5h18M5 14h18M5 19.5h18"/></svg>
  </button>
</nav>
<div id="main">
<header>
  <div class="side"><button id="rename" data-i18n="rename"></button></div>
  <div class="title" data-i18n="app_title"></div>
  <div class="side r"><button id="lang"></button></div>
</header>
<div id="peers"></div>
<div id="list"></div>
<footer>
  <div id="tools"><button id="attach" title="发送文件">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#4a4a4a" stroke-width="1.6">
      <path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
  </button></div>
  <div id="irow">
    <textarea id="txt" rows="1"></textarea>
    <button class="btn" id="plus">+</button>
    <button id="send" data-i18n="send"></button>
  </div>
  <input type="file" id="file" multiple>
</footer>
<div id="foot-note" data-i18n="direct"></div>
</div>
</div>
<div id="mask"><div id="invite-card">
  <!-- 面 1:邀请(出码) -->
  <div id="pane-invite">
    <h3 data-i18n="invite_title"></h3>
    <div class="tip" data-i18n="invite_tip"></div>
    <div id="qr"></div>
    <div id="room-label"></div>
    <button id="copy-btn" class="minor" data-i18n="copy_link"></button>
    <button id="leave-btn" class="minor" data-i18n="leave_room"></button>
    <a class="flip" id="to-join" data-i18n="to_join"></a>
  </div>
  <!-- 面 2:加入(扫码/输码) -->
  <div id="pane-join">
    <h3 data-i18n="join_title"></h3>
    <button id="scan-btn" class="primary" data-i18n="scan_join"></button>
    <div id="code-row">
      <input id="code-input" maxlength="8" autocomplete="off" autocapitalize="characters">
      <button id="code-go" data-i18n="join"></button>
    </div>
    <a class="flip" id="to-invite" data-i18n="to_invite"></a>
  </div>
  <button id="close-btn">✕</button>
</div></div>
<!-- 站内扫码(不求微信) -->
<div id="scan"><video id="cam" playsinline muted></video>
  <div id="scan-frame"></div>
  <div id="scan-tip" data-i18n="scan_tip"></div>
  <button id="scan-cancel">✕</button>
</div>
<script src="i18n.js"></script>
<script src="qrcode.min.js"></script>
<script src="app.js"></script>
</body>
</html>
